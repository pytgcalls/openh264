name: build
on:
  push:
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - "NOTICE"
      - ".gitignore"
    tags:
      - "*"
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: linux-x86_64
            cross-file: ""
          - name: linux-arm64
            cross-file: cross_linux_arm64.meson
          - name: windows-x86_64
            cross-file: cross_win_x86_64.meson
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -qq nasm
          if [[ "${{ matrix.platform.name }}" == "linux-arm64" ]]; then
          sudo apt-get install -qq g++-aarch64-linux-gnu qemu-user
          fi
          if [[ "${{ matrix.platform.name }}" == "windows-x86_64" ]]; then
          sudo apt-get install -qq mingw-w64 gcc-mingw-w64
          fi

      - name: Install Python Requirements
        run: python -m pip install meson ninja

      - name: Configure with Meson
        if: matrix.platform.name == 'linux-x86_64'
        run: |
          python -m mesonbuild.mesonmain setup build_output --prefix=$(pwd)/build_output --libdir=lib --buildtype=release --default-library=static

      - name: Configure with Cross Compile Meson
        if: matrix.platform.name == 'linux-arm64' || matrix.platform.name == 'windows-x86_64'
        run: |
          python -m mesonbuild.mesonmain setup build_output --cross-file "${{ matrix.platform.cross-file }}" --prefix=$(pwd)/build_output --libdir=lib --buildtype=release --default-library=static

      - name: Build with Ninja
        run: python -m ninja -C build_output

      - name: Install to build_output
        run: python -m ninja -C build_output install

      - name: Prepare for artifact
        run: |
          mkdir -p artifacts/lib
          if [[ "${{ matrix.platform.name }}" == "windows-x86_64" ]]; then
          mv build_output/lib/libopenh264.a artifacts/lib/openh264.lib
          else
          mv build_output/lib/libopenh264.a artifacts/lib/
          fi
          mv build_output/include artifacts/
          tar -czvf openh264.${{ matrix.platform.name }}.tar.gz artifacts

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: openh264.${{ matrix.platform.name }}.tar.gz
          path: openh264.${{ matrix.platform.name }}.tar.gz

  build-macos:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macos-arm64
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Python Requirements
        run: |
          python -m pip install --upgrade pip
          python -m pip install meson ninja

      - name: Install Python Requirements
        run: python -m pip install meson ninja

      - name: Build with Meson
        run: python -m mesonbuild.mesonmain setup build_output --prefix=$(pwd)/build_output --libdir=lib --buildtype=release --default-library=static

      - name: Build with Ninja
        run: python -m ninja -C build_output

      - name: Install to build_output
        run: python -m ninja -C build_output install

      - name: Prepare for artifact
        run: |
          mkdir -p artifacts/lib
          mv build_output/lib/libopenh264.a artifacts/lib/
          mv build_output/include artifacts/
          tar -czvf openh264.${{ matrix.platform.name }}.tar.gz artifacts

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: openh264.${{ matrix.platform.name }}.tar.gz
          path: openh264.${{ matrix.platform.name }}.tar.gz

  create-release:
    name: Create Release
    if: contains(github.ref, 'tags/v')
    needs:
      - build
      - build-macos

    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/download
        with:
          platform: windows-x86_64
      - uses: ./.github/actions/download
        with:
          platform: macos-arm64
      - uses: ./.github/actions/download
        with:
          platform: linux-x86_64
      - uses: ./.github/actions/download
        with:
          platform: linux-arm64
      - name: Env to output
        run: |
          echo "package_paths<<EOF" >> $GITHUB_OUTPUT
          cat package_paths.env >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        id: env
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.env.outputs.package_paths }}
